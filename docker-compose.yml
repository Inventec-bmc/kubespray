services:
  launcher:
    build: .                     # 告訴 Compose 在當前目錄找 Dockerfile
    pull_policy: never           # 新增這行：強制規定「絕對不要」去網路下載
    image: my-kubespray:v2.30.0  # 使用您剛剛自己 Build 出來的映像檔
    container_name: kubespray-launcher
    # 開啟互動模式 (等同於 docker run 的 -it)
    stdin_open: true
    tty: true
    # 進入容器後的預設目錄
    working_dir: /kubespray
    # 🔑 新增 Ports 區塊：將實體機的 127.0.0.1:8080 綁定到容器內的 8080
    ports:
      - "0.0.0.0:8080:8080"
    # 掛載本機檔案與金鑰
    volumes:
      # 🔑 捨棄整個目錄掛載，改為精準掛載實體檔案
      - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
      - ~/.ssh/k8s_multipass_rsa:/root/.ssh/k8s_multipass_rsa:ro
      - .:/kubespray                              # 將當前目錄掛載進去
      - /var/run/docker.sock:/var/run/docker.sock # 🔑 新增這行：把實體機的 Docker 引擎控制權掛載進來
    # 預設執行的指令
    command: bash
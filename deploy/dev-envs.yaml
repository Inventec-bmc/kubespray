# --- User 1 ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: dev-user1 }
spec:
  replicas: 1
  selector: { matchLabels: { user: user1 } }
  template:
    metadata: { labels: { user: user1 } }
    spec:
      containers:
      - name: ubuntu
        image: ubuntu:24.04
        command: [ "/bin/bash", "-c", "--" ]
        args: [ "apt update && apt install -y openssh-server sudo && mkdir -p /run/sshd && echo 'root:password123' | chpasswd && sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && /usr/sbin/sshd -D" ]
        ports:
        - containerPort: 22
---
apiVersion: v1
kind: Service
metadata: { name: ssh-user1 }
spec:
  type: NodePort
  selector: { user: user1 }
  ports:
    - port: 22
      targetPort: 22
      nodePort: 32201

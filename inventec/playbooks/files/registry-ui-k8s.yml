apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-browser
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-browser
  template:
    metadata:
      labels:
        app: registry-browser
    spec:
      containers:
      - name: registry-browser
        image: klausmeyer/docker-registry-browser:latest
        ports:
        - containerPort: 8080
        env:
        # 指向 K8s 內部的 Registry Service 網址
        - name: DOCKER_REGISTRY_URL
          value: "http://registry.kube-system.svc.cluster.local:5000"
        - name: SECRET_KEY_BASE
          value: "inventec_secret_67890"
---
apiVersion: v1
kind: Service
metadata:
  name: registry-browser-svc
  namespace: kube-system
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 38080 # 瀏覽器存取 Port
  selector:
    app: registry-browser